<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="utf-8" />
    <title>Jutusta — seaded</title>
    <style>
      body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 440px; margin: 24px auto; padding: 0 16px; color: #111; }
      h1 { font-size: 18px; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font: inherit; box-sizing: border-box; }
      .row { display: flex; gap: 12px; }
      .row > div { flex: 1; }
      button { margin-top: 18px; padding: 9px 16px; border: none; border-radius: 8px; background: #1f6feb; color: #fff; font: inherit; cursor: pointer; }
      button.secondary { background: #e5e7eb; color: #111; }
      #msg { margin-top: 12px; min-height: 20px; font-size: 13px; }
      .hint { color: #666; font-size: 12px; margin-top: 2px; }
      .speedval { font-weight: 400; color: #666; }
      .voicebar { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
      .voicebar .hint { margin: 0; }
      a.refresh { color: #1f6feb; cursor: pointer; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Jutusta — Loe eesti keeles</h1>

    <label for="apiKey">API võti</label>
    <input id="apiKey" type="password" placeholder="sk_jt_…" autocomplete="off" />
    <div class="hint">Loo võti jutusta.ee → Arendajatele. Hoitakse ainult selles brauseris (chrome.storage.local).</div>

    <div class="row">
      <div>
        <label for="source">Lähtekeel</label>
        <select id="source"></select>
        <div class="hint">Veebiteksti keel</div>
      </div>
      <div>
        <label for="target">Sihtkeel</label>
        <select id="target"></select>
        <div class="hint">Mis keeles ette loeb</div>
      </div>
    </div>

    <label for="voice">Hääl</label>
    <select id="voice"></select>
    <div class="voicebar">
      <span class="hint" id="voicecount"></span>
      <a class="refresh" id="refresh">↻ Värskenda hääli API-st</a>
    </div>

    <label for="speed">Kõnetempo <span class="speedval" id="speedval">1.0×</span></label>
    <input id="speed" type="range" min="0.5" max="2" step="0.1" value="1" />

    <div>
      <button id="save">Salvesta</button>
      <button id="test" class="secondary">Testi häält</button>
    </div>
    <div id="msg"></div>

    <script src="voices-data.js"></script>
    <script src="options.js"></script>
  </body>
</html>
